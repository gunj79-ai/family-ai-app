services:
  # Backend API Server
  - type: web
    name: family-ai-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-haiku-4-5-20251001
      - key: ESCALATION_MODEL
        value: claude-sonnet-4-6
      - key: PII_STRIPPING_ENABLED
        value: true
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: CORS_ORIGINS
        value: "*"
      - key: DATA_DIR
        value: /var/data
      - key: DB_PATH
        value: /var/data/familyai.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: family-ai-data
      mountPath: /var/data
      sizeGB: 1

  # Frontend Static Site
  - type: web
    name: family-ai-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ../backend/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    autoDeploy: true
